##############################################################
# 광고 플랫폼 Lakehouse 실전 설계 - 실습 환경
#
# Week 1 (기본):  docker compose up
# Week 2 (스트리밍): docker compose --profile streaming up
##############################################################

services:
  # ─── Jupyter + PySpark + Iceberg ───────────────────────
  spark-iceberg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-iceberg
    ports:
      - "8888:8888"   # Jupyter Notebook
      - "4040:4040"   # Spark UI (job 실행 중에만 활성)
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./jobs:/home/jovyan/jobs
      - ./data:/home/jovyan/data
      - warehouse:/home/jovyan/warehouse
      - ${HOME}/.aws:/home/jovyan/.aws:ro
    environment:
      JUPYTER_TOKEN: iceberg
      AWS_PROFILE: ${AWS_PROFILE:-iceberg-lab}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-2}
      AWS_SDK_LOAD_CONFIG: "1"
    networks:
      - lakehouse

  # ─── Kafka (Week 2+: 스트리밍 실습용) ─────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s
    profiles: ["streaming"]
    networks:
      - lakehouse

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    profiles: ["streaming"]
    networks:
      - lakehouse

  # Kafka UI (선택) - 토픽/메시지 시각화
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    profiles: ["streaming"]
    networks:
      - lakehouse

  # ─── Airflow (Week 4: 자동화 실습용) ───────────────────
  # 한 줄: docker compose --profile airflow up -d --build
  #
  # Airflow의 BashOperator가 `docker exec spark-iceberg /usr/local/spark/bin/spark-submit ...`
  # 형태로 spark-iceberg 컨테이너를 부른다. 이를 위해
  #   1) Dockerfile.airflow 가 docker CLI를 설치해두고
  #   2) /var/run/docker.sock을 read-only로 마운트한다 (Mac Docker Desktop은 root 소유)
  # lab 단순화를 위해 airflow 서비스는 root 유저로 띄운다.
  airflow-postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["airflow"]
    networks:
      - lakehouse

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com || true
    profiles: ["airflow"]
    networks:
      - lakehouse

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    user: "0:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: lakehouse-lab-secret
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      ICEBERG_CATALOG_NAME: ${ICEBERG_CATALOG_NAME:-glue_catalog}
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:?set ICEBERG_WAREHOUSE=s3://<bucket>/<prefix>/warehouse}
      ICEBERG_DATABASE: ${ICEBERG_DATABASE:-ad_lakehouse}
      ICEBERG_RAW_BASE: ${ICEBERG_RAW_BASE:?set ICEBERG_RAW_BASE=s3://<bucket>/<prefix>/raw}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs:ro
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles: ["airflow"]
    networks:
      - lakehouse

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    user: "0:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      ICEBERG_CATALOG_NAME: ${ICEBERG_CATALOG_NAME:-glue_catalog}
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:?set ICEBERG_WAREHOUSE=s3://<bucket>/<prefix>/warehouse}
      ICEBERG_DATABASE: ${ICEBERG_DATABASE:-ad_lakehouse}
      ICEBERG_RAW_BASE: ${ICEBERG_RAW_BASE:?set ICEBERG_RAW_BASE=s3://<bucket>/<prefix>/raw}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs:ro
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    profiles: ["airflow"]
    networks:
      - lakehouse

volumes:
  warehouse:
  airflow-postgres:
  airflow-logs:

networks:
  lakehouse:
    driver: bridge
